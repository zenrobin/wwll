<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Easter Bunny Hunt</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
    user-select: none;
    background: #87CEEB;
  }
  .screen { display: none; position: absolute; inset: 0; }
  .screen.active { display: flex; }

  /* === START SCREEN === */
  #start-screen {
    flex-direction: column; align-items: center; justify-content: center;
    background: linear-gradient(180deg, #87CEEB 0%, #b6e8a0 60%, #4a7c2e 100%);
    text-align: center; gap: 20px;
  }
  #start-screen h1 {
    font-size: 3rem; color: #5D3A1A;
    text-shadow: 2px 2px 0 #FFD700, -1px -1px 0 #fff;
    animation: bounce 1s ease infinite alternate;
  }
  @keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-14px)} }
  #start-screen .subtitle { font-size: 1.15rem; color: #3A6B35; max-width: 420px; line-height: 1.5; }
  .preview-eggs { display: flex; gap: 10px; justify-content: center; }
  .preview-egg {
    width: 40px; height: 52px;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    box-shadow: 0 3px 8px rgba(0,0,0,0.3), inset 0 -8px 12px rgba(0,0,0,0.1);
    animation: wobble 2s ease infinite;
  }
  @keyframes wobble {
    0%,100%{transform:rotate(-5deg)} 50%{transform:rotate(5deg)}
  }
  .btn {
    padding: 16px 48px; font-size: 1.4rem; border: none; border-radius: 50px;
    cursor: pointer; font-weight: bold;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }
  .btn:hover { transform: scale(1.08); box-shadow: 0 6px 25px rgba(0,0,0,0.3); }
  .btn:active { transform: scale(0.95); }
  .btn-play { background: linear-gradient(135deg, #FF6B6B, #FF8E53); color: white; }

  /* === GAME SCREEN === */
  #game-screen {
    flex-direction: column;
    background: linear-gradient(180deg, #5bb8f5 0%, #87CEEB 40%, #a8d98a 65%, #4a7c2e 100%);
  }
  #hud {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 20px; background: rgba(255,255,255,0.88);
    backdrop-filter: blur(6px); z-index: 100;
    border-bottom: 3px solid #FFD700; flex-wrap: wrap; gap: 8px;
  }
  #hud .eggs-found { font-size: 1.1rem; color: #5D3A1A; font-weight: bold; }
  #hud .timer { font-size: 1.1rem; color: #C0392B; font-weight: bold; }
  .hint-btn {
    padding: 8px 16px; background: #FFD700; border: 2px solid #DAA520;
    border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 0.85rem;
  }
  .hint-btn:hover { background: #ffe44d; }
  #basket { display: flex; flex-wrap: wrap; gap: 4px; max-width: 260px; }
  .basket-egg-slot {
    width: 18px; height: 23px;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    opacity: 0.25; transition: opacity 0.4s, transform 0.4s;
    border: 1px solid rgba(0,0,0,0.15);
  }
  .basket-egg-slot.collected { opacity: 1; animation: collectPop 0.5s ease; }
  @keyframes collectPop { 0%{transform:scale(0)} 50%{transform:scale(1.6)} 100%{transform:scale(1)} }

  #game-world { flex: 1; position: relative; overflow: hidden; cursor: crosshair; }

  /* === CSS CLOUDS === */
  .cloud {
    position: absolute; pointer-events: none; z-index: 2;
    animation: cloudDrift linear infinite;
  }
  .cloud-puff {
    position: absolute; background: white; border-radius: 50%;
    box-shadow: inset -4px -4px 8px rgba(0,0,0,0.04);
  }
  @keyframes cloudDrift { from{transform:translateX(-200px)} to{transform:translateX(calc(100vw + 200px))} }

  /* === GRASS === */
  .grass-layer {
    position: absolute; bottom: 0; left: 0; right: 0; pointer-events: none; z-index: 5;
  }
  #grass-back {
    height: 80px;
    background: 
      repeating-linear-gradient(85deg, transparent 0px, transparent 12px, #3d8c2e 12px, #3d8c2e 14px, transparent 14px, transparent 25px),
      linear-gradient(0deg, #2d6b1e 0%, #4a9e35 60%, transparent 100%);
    bottom: 0;
  }
  #grass-mid {
    height: 60px; bottom: 0;
    background:
      repeating-linear-gradient(92deg, transparent 0px, transparent 8px, #52a83a 8px, #52a83a 10px, transparent 10px, transparent 18px),
      linear-gradient(0deg, #3a8528 0%, #5cb945 70%, transparent 100%);
  }
  #grass-front {
    height: 45px; bottom: 0; z-index: 15;
    background:
      repeating-linear-gradient(88deg, transparent 0px, transparent 6px, #6ad44e 6px, #6ad44e 8px, transparent 8px, transparent 16px),
      linear-gradient(0deg, #4ca832 0%, #6fd455 80%, transparent 100%);
  }
  .grass-blade {
    position: absolute; bottom: 0; width: 4px; pointer-events: none; z-index: 16;
    border-radius: 2px 2px 0 0;
    animation: sway 3s ease-in-out infinite;
    transform-origin: bottom center;
  }
  @keyframes sway { 0%,100%{transform:rotate(-5deg)} 50%{transform:rotate(5deg)} }

  /* === CSS EGGS === */
  .egg {
    position: absolute; cursor: pointer; pointer-events: all; z-index: 10;
    transition: transform 0.2s, filter 0.2s;
  }
  .egg:hover { transform: scale(1.15); filter: brightness(1.1); }
  .egg-shell {
    width: 44px; height: 56px;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    position: relative; overflow: hidden;
    box-shadow: 0 3px 10px rgba(0,0,0,0.3), inset 0 -6px 10px rgba(0,0,0,0.1), inset 0 3px 6px rgba(255,255,255,0.3);
  }
  .egg-pattern {
    position: absolute; inset: 0; opacity: 0.5;
  }

  /* Crack animation */
  .egg.cracking { pointer-events: none; animation: none; }
  .egg.cracking .egg-shell { animation: crackShake 0.3s ease; }
  @keyframes crackShake {
    0%,100%{transform:rotate(0)} 20%{transform:rotate(-8deg)} 40%{transform:rotate(8deg)}
    60%{transform:rotate(-5deg)} 80%{transform:rotate(5deg)}
  }
  .crack-half {
    position: absolute; width: 44px; height: 28px; overflow: hidden; opacity: 0;
  }
  .crack-half.top { top: 0; border-radius: 22px 22px 0 0; }
  .crack-half.bottom { bottom: 0; border-radius: 0 0 22px 22px; }
  .egg.cracked .egg-shell { opacity: 0; transition: opacity 0.2s; }
  .egg.cracked .crack-half {
    opacity: 1;
  }
  .egg.cracked .crack-half.top {
    animation: flyTop 0.6s ease forwards;
  }
  .egg.cracked .crack-half.bottom {
    animation: flyBottom 0.6s ease forwards;
  }
  @keyframes flyTop {
    0%{transform:translateY(0) rotate(0); opacity:1}
    100%{transform:translateY(-60px) rotate(-30deg) translateX(-20px); opacity:0}
  }
  @keyframes flyBottom {
    0%{transform:translateY(0) rotate(0); opacity:1}
    100%{transform:translateY(40px) rotate(25deg) translateX(15px); opacity:0}
  }
  .egg-prize {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0);
    font-size: 2rem; z-index: 12;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .egg.cracked .egg-prize { transform: translate(-50%,-50%) scale(1); }

  .egg.hint-glow .egg-shell {
    animation: hintPulse 0.8s ease 4;
  }
  @keyframes hintPulse {
    0%,100%{box-shadow: 0 3px 10px rgba(0,0,0,0.3)} 
    50%{box-shadow: 0 0 20px gold, 0 0 40px gold, 0 3px 10px rgba(0,0,0,0.3)}
  }

  /* === FENCES === */
  .fence {
    position: absolute; z-index: 12; pointer-events: none;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .fence.hidden { transform: translateX(120%); }
  .fence.visible { transform: translateX(0); }
  .fence-post {
    width: 12px; background: linear-gradient(90deg, #8B6914, #C4982A, #8B6914);
    border-radius: 3px 3px 0 0; position: absolute; bottom: 0;
    box-shadow: 1px 0 2px rgba(0,0,0,0.2);
  }
  .fence-rail {
    position: absolute; left: 0; right: 0;
    height: 8px; background: linear-gradient(180deg, #C4982A, #8B6914);
    border-radius: 2px; box-shadow: 0 2px 3px rgba(0,0,0,0.2);
  }
  .fence-blocker {
    position: absolute; inset: 0;
    pointer-events: all; cursor: not-allowed; z-index: 13;
  }
  .fence.hidden .fence-blocker { pointer-events: none; }

  /* === SPARKLES === */
  .sparkle {
    position: fixed; pointer-events: none; font-size: 1.5rem; z-index: 200;
    animation: sparkleAnim 0.8s ease forwards;
  }
  @keyframes sparkleAnim {
    0%{transform:scale(0) rotate(0);opacity:1}
    100%{transform:scale(1.5) rotate(180deg) translateY(-40px);opacity:0}
  }

  /* === DECORATIONS === */
  .decoration { position: absolute; pointer-events: none; z-index: 3; }

  /* === CLUE POPUP === */
  #overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:400; }
  #clue-popup {
    display: none; position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%); background: white;
    border: 4px solid #FFD700; border-radius: 20px; padding: 30px;
    z-index: 500; text-align: center; max-width: 340px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3); animation: popIn 0.4s ease;
  }
  @keyframes popIn { 0%{transform:translate(-50%,-50%) scale(0)} 100%{transform:translate(-50%,-50%) scale(1)} }
  #clue-popup .egg-icon { font-size: 3rem; }
  #clue-popup .clue-text { margin: 12px 0; font-size: 1.1rem; color: #5D3A1A; }
  #clue-popup .clue-points { color: #E67E22; font-weight: bold; font-size: 1.2rem; }
  #clue-popup .btn-close {
    margin-top: 14px; padding: 10px 32px; background: #4CAF50; color: white;
    border: none; border-radius: 20px; cursor: pointer; font-size: 1rem; font-weight: bold;
  }
  #clue-popup .btn-close:hover { background: #45a049; }

  /* === WIN SCREEN === */
  #win-screen {
    flex-direction: column; align-items: center; justify-content: center;
    background: linear-gradient(180deg, #FFD700 0%, #FFA500 50%, #FF6347 100%);
    text-align: center; gap: 16px;
  }
  #win-screen h1 { font-size: 2.6rem; color: white; text-shadow: 2px 2px 0 #C0392B; }
  #win-screen .trophy { font-size: 5rem; animation: wobble 1s ease infinite; }
  #win-screen .stats { font-size: 1.2rem; color: #5D3A1A; }
  .btn-restart { background: linear-gradient(135deg, #4CAF50, #45B7D1); color: white; }

  /* === FENCE STATUS === */
  #fence-status {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    background: rgba(139,69,19,0.85); color: #FFD700; padding: 6px 18px;
    border-radius: 14px; font-weight: bold; font-size: 0.85rem; z-index: 50;
    transition: opacity 0.5s;
    pointer-events: none;
  }

  @media (max-width: 600px) {
    #start-screen h1 { font-size: 2rem; }
    .btn { padding: 12px 36px; font-size: 1.1rem; }
    #clue-popup { max-width: 280px; padding: 20px; }
    .egg-shell { width: 36px; height: 46px; }
  }
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="start-screen" class="screen active">
  <div class="preview-eggs">
    <div class="preview-egg" style="background:linear-gradient(135deg,#FF6B6B,#ff4757);animation-delay:0s"></div>
    <div class="preview-egg" style="background:linear-gradient(135deg,#FFD93D,#f0932b);animation-delay:0.3s"></div>
    <div class="preview-egg" style="background:linear-gradient(135deg,#6BCB77,#26de81);animation-delay:0.6s"></div>
    <div class="preview-egg" style="background:linear-gradient(135deg,#4D96FF,#3867d6);animation-delay:0.9s"></div>
    <div class="preview-egg" style="background:linear-gradient(135deg,#C77DFF,#8854d0);animation-delay:1.2s"></div>
  </div>
  <h1>The Easter Bunny Hunt</h1>
  <p class="subtitle">
    Find all <strong>12 colorful eggs</strong> hidden in the garden!
    Click them to crack them open and discover the prize inside.
    Watch out for the fences — they move to block your way!
  </p>
  <button class="btn btn-play" onclick="startGame()">Start the Hunt!</button>
</div>

<!-- GAME SCREEN -->
<div id="game-screen" class="screen">
  <div id="hud">
    <span class="eggs-found">Eggs: <span id="count">0</span> / 12</span>
    <div id="basket"></div>
    <button class="hint-btn" onclick="useHint()">Hint (<span id="hints-left">3</span>)</button>
    <span class="timer">Time: <span id="timer">0:00</span></span>
  </div>
  <div id="game-world">
    <div id="fence-status">Fences incoming...</div>
    <div id="grass-back" class="grass-layer"></div>
    <div id="grass-mid" class="grass-layer"></div>
    <div id="grass-front" class="grass-layer"></div>
  </div>
</div>

<!-- Clue popup -->
<div id="overlay" onclick="closeClue()"></div>
<div id="clue-popup">
  <div class="egg-icon" id="clue-egg-icon"></div>
  <div class="clue-text" id="clue-text"></div>
  <div class="clue-points" id="clue-points"></div>
  <button class="btn-close" onclick="closeClue()">Awesome!</button>
</div>

<!-- WIN SCREEN -->
<div id="win-screen" class="screen">
  <div class="trophy">🏆</div>
  <h1>You Found Them All!</h1>
  <p class="stats" id="win-stats"></p>
  <p class="stats" id="win-score"></p>
  <button class="btn btn-restart" onclick="restartGame()">Play Again!</button>
</div>

<script>
// ============================================================
//  THE EASTER BUNNY HUNT - GAME ENGINE
// ============================================================

const EGG_CONFIGS = [
  { color: '#FF6B6B', gradient: 'linear-gradient(135deg,#FF6B6B,#ff4757)', pattern: 'stripes', prize: '🍬', name: 'Candy' },
  { color: '#FFD93D', gradient: 'linear-gradient(135deg,#FFD93D,#f0932b)', pattern: 'dots', prize: '🐰', name: 'Bunny' },
  { color: '#6BCB77', gradient: 'linear-gradient(135deg,#6BCB77,#26de81)', pattern: 'zigzag', prize: '🍫', name: 'Chocolate' },
  { color: '#4D96FF', gradient: 'linear-gradient(135deg,#4D96FF,#3867d6)', pattern: 'stripes', prize: '🧸', name: 'Teddy Bear' },
  { color: '#FF6FB7', gradient: 'linear-gradient(135deg,#FF6FB7,#e84393)', pattern: 'dots', prize: '🎀', name: 'Ribbon' },
  { color: '#C77DFF', gradient: 'linear-gradient(135deg,#C77DFF,#8854d0)', pattern: 'zigzag', prize: '🌟', name: 'Star' },
  { color: '#45B7D1', gradient: 'linear-gradient(135deg,#45B7D1,#0fb9b1)', pattern: 'stripes', prize: '🎪', name: 'Toy' },
  { color: '#F97316', gradient: 'linear-gradient(135deg,#F97316,#e17055)', pattern: 'dots', prize: '🐥', name: 'Chick' },
  { color: '#EC4899', gradient: 'linear-gradient(135deg,#EC4899,#fd79a8)', pattern: 'zigzag', prize: '💝', name: 'Heart' },
  { color: '#8B5CF6', gradient: 'linear-gradient(135deg,#8B5CF6,#6c5ce7)', pattern: 'stripes', prize: '🎵', name: 'Music Box' },
  { color: '#14B8A6', gradient: 'linear-gradient(135deg,#14B8A6,#00b894)', pattern: 'dots', prize: '🦄', name: 'Unicorn' },
  { color: '#F59E0B', gradient: 'linear-gradient(135deg,#F59E0B,#fdcb6e)', pattern: 'zigzag', prize: '👑', name: 'Crown' },
];

const CLUES = [
  { text: "The early bird catches the worm... and this candy!", points: 10 },
  { text: "A bunny was hiding this one — hop hop!", points: 15 },
  { text: "Chocolate! The best Easter treat of all!", points: 20 },
  { text: "A cuddly teddy bear was inside!", points: 15 },
  { text: "A pretty ribbon — how fancy!", points: 25 },
  { text: "You found a shining star!", points: 10 },
  { text: "A toy surprise! How exciting!", points: 20 },
  { text: "A baby chick! Peep peep!", points: 30 },
  { text: "A heart full of love for Easter!", points: 15 },
  { text: "A music box that plays a springtime tune!", points: 20 },
  { text: "A magical unicorn — so rare!", points: 25 },
  { text: "A golden crown for the champion egg hunter!", points: 50 },
];

let eggs = [];
let fences = [];
let found = 0;
let score = 0;
let hintsLeft = 3;
let timerInterval = null;
let fenceInterval = null;
let seconds = 0;
let gameActive = false;

function rand(min, max) { return Math.random() * (max - min) + min; }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function formatTime(s) {
  const m = Math.floor(s / 60);
  return m + ':' + (s % 60).toString().padStart(2, '0');
}

function getPattern(type, color) {
  if (type === 'stripes') {
    return `repeating-linear-gradient(0deg, transparent 0px, transparent 6px, rgba(255,255,255,0.4) 6px, rgba(255,255,255,0.4) 10px)`;
  } else if (type === 'dots') {
    return `radial-gradient(circle 4px at 30% 25%, rgba(255,255,255,0.5) 100%, transparent 100%),
            radial-gradient(circle 4px at 70% 50%, rgba(255,255,255,0.5) 100%, transparent 100%),
            radial-gradient(circle 4px at 30% 75%, rgba(255,255,255,0.5) 100%, transparent 100%)`;
  } else {
    return `repeating-linear-gradient(135deg, transparent 0px, transparent 5px, rgba(255,255,255,0.35) 5px, rgba(255,255,255,0.35) 8px, transparent 8px, transparent 13px)`;
  }
}

function createCloud(world) {
  const cloud = document.createElement('div');
  cloud.className = 'cloud';
  const baseSize = rand(60, 140);
  cloud.style.width = baseSize + 'px';
  cloud.style.height = (baseSize * 0.5) + 'px';
  cloud.style.top = rand(3, 22) + '%';
  cloud.style.animationDuration = rand(25, 50) + 's';
  cloud.style.animationDelay = rand(0, 20) + 's';
  
  const puffs = [
    { x: 0.1, y: 0.3, s: 0.6 },
    { x: 0.3, y: 0.1, s: 0.8 },
    { x: 0.5, y: 0.2, s: 1.0 },
    { x: 0.7, y: 0.15, s: 0.7 },
    { x: 0.4, y: 0.4, s: 0.9 },
    { x: 0.6, y: 0.35, s: 0.65 },
  ];
  puffs.forEach(p => {
    const puff = document.createElement('div');
    puff.className = 'cloud-puff';
    const size = baseSize * 0.4 * p.s;
    puff.style.width = size + 'px';
    puff.style.height = size + 'px';
    puff.style.left = (p.x * baseSize) + 'px';
    puff.style.top = (p.y * baseSize * 0.5) + 'px';
    cloud.appendChild(puff);
  });
  world.appendChild(cloud);
}

function createGrassBlades(world) {
  for (let i = 0; i < 30; i++) {
    const blade = document.createElement('div');
    blade.className = 'grass-blade';
    blade.style.left = rand(0, 100) + '%';
    blade.style.height = rand(20, 55) + 'px';
    blade.style.background = `linear-gradient(0deg, #3a8528, ${['#5cb945','#4ca832','#6fd455','#3d8c2e'][randInt(0,3)]})`;
    blade.style.animationDelay = rand(0, 2) + 's';
    blade.style.animationDuration = rand(2, 4) + 's';
    world.appendChild(blade);
  }
}

function createFence(world, x, width, height) {
  const fence = document.createElement('div');
  fence.className = 'fence hidden';
  fence.style.left = x + '%';
  fence.style.bottom = '30px';
  fence.style.width = width + 'px';
  fence.style.height = height + 'px';

  const postCount = Math.ceil(width / 35);
  for (let i = 0; i < postCount; i++) {
    const post = document.createElement('div');
    post.className = 'fence-post';
    post.style.height = height + 'px';
    post.style.left = (i * (width / (postCount - 1))) + 'px';
    fence.appendChild(post);
  }
  const rail1 = document.createElement('div');
  rail1.className = 'fence-rail';
  rail1.style.top = '15%';
  fence.appendChild(rail1);
  const rail2 = document.createElement('div');
  rail2.className = 'fence-rail';
  rail2.style.top = '55%';
  fence.appendChild(rail2);

  const blocker = document.createElement('div');
  blocker.className = 'fence-blocker';
  fence.appendChild(blocker);

  world.appendChild(fence);
  return fence;
}

function buildScene() {
  const world = document.getElementById('game-world');
  // Keep grass layers, clear dynamic content
  const grassBack = document.getElementById('grass-back');
  const grassMid = document.getElementById('grass-mid');
  const grassFront = document.getElementById('grass-front');
  const fenceStatus = document.getElementById('fence-status');
  world.innerHTML = '';
  world.appendChild(fenceStatus);
  world.appendChild(grassBack);
  world.appendChild(grassMid);
  world.appendChild(grassFront);

  // Clouds
  for (let i = 0; i < 5; i++) createCloud(world);

  // Sun
  const sun = document.createElement('div');
  sun.className = 'decoration';
  sun.textContent = '☀️';
  sun.style.fontSize = '3.5rem';
  sun.style.top = '4%';
  sun.style.right = '6%';
  world.appendChild(sun);

  // Decorations: trees, flowers, bushes
  const decs = [
    { emoji: '🌳', count: 5, minX: 2, maxX: 92, minY: 18, maxY: 55, size: '3.2rem' },
    { emoji: '🌷', count: 8, minX: 2, maxX: 95, minY: 50, maxY: 78, size: '1.6rem' },
    { emoji: '🌻', count: 4, minX: 5, maxX: 90, minY: 40, maxY: 70, size: '1.8rem' },
    { emoji: '🌼', count: 6, minX: 3, maxX: 95, minY: 55, maxY: 80, size: '1.3rem' },
    { emoji: '🌿', count: 6, minX: 0, maxX: 95, minY: 50, maxY: 78, size: '2rem' },
    { emoji: '🍄', count: 3, minX: 10, maxX: 85, minY: 60, maxY: 78, size: '1.4rem' },
    { emoji: '🐰', count: 2, minX: 5, maxX: 90, minY: 55, maxY: 75, size: '1.8rem' },
    { emoji: '🐥', count: 2, minX: 10, maxX: 85, minY: 60, maxY: 78, size: '1.3rem' },
  ];
  decs.forEach(d => {
    for (let i = 0; i < d.count; i++) {
      const el = document.createElement('div');
      el.className = 'decoration';
      el.textContent = d.emoji;
      el.style.fontSize = d.size;
      el.style.left = rand(d.minX, d.maxX) + '%';
      el.style.top = rand(d.minY, d.maxY) + '%';
      world.appendChild(el);
    }
  });

  // Grass blades
  createGrassBlades(world);

  // Place 12 eggs
  eggs = [];
  const usedPos = [];
  for (let i = 0; i < 12; i++) {
    let x, y, ok;
    let attempts = 0;
    do {
      x = rand(4, 88);
      y = rand(28, 75);
      ok = !usedPos.some(p => Math.abs(p.x - x) < 9 && Math.abs(p.y - y) < 9);
      attempts++;
    } while (!ok && attempts < 80);
    usedPos.push({ x, y });

    const cfg = EGG_CONFIGS[i];
    const egg = document.createElement('div');
    egg.className = 'egg';
    egg.style.left = x + '%';
    egg.style.top = y + '%';

    const shell = document.createElement('div');
    shell.className = 'egg-shell';
    shell.style.background = cfg.gradient;

    const pattern = document.createElement('div');
    pattern.className = 'egg-pattern';
    pattern.style.background = getPattern(cfg.pattern, cfg.color);

    shell.appendChild(pattern);
    egg.appendChild(shell);

    // Crack halves (hidden, shown on crack)
    const topHalf = document.createElement('div');
    topHalf.className = 'crack-half top';
    topHalf.style.background = cfg.gradient;
    egg.appendChild(topHalf);

    const bottomHalf = document.createElement('div');
    bottomHalf.className = 'crack-half bottom';
    bottomHalf.style.background = cfg.gradient;
    egg.appendChild(bottomHalf);

    // Prize
    const prize = document.createElement('div');
    prize.className = 'egg-prize';
    prize.textContent = cfg.prize;
    egg.appendChild(prize);

    egg.dataset.index = i;
    egg.addEventListener('click', (e) => collectEgg(e, i));
    world.appendChild(egg);
    eggs.push({ el: egg, found: false, x, y });
  }

  // Create fences (5 fence sections)
  fences = [];
  const fencePositions = [8, 25, 42, 60, 78];
  for (let i = 0; i < 5; i++) {
    const f = createFence(world, fencePositions[i], randInt(100, 140), randInt(60, 85));
    fences.push({ el: f, visible: false });
  }

  // Basket in HUD
  const basket = document.getElementById('basket');
  basket.innerHTML = '';
  for (let i = 0; i < 12; i++) {
    const slot = document.createElement('div');
    slot.className = 'basket-egg-slot';
    slot.style.background = EGG_CONFIGS[i].gradient;
    slot.id = 'basket-' + i;
    basket.appendChild(slot);
  }
}

// ---- FENCE LOGIC ----
function startFenceCycle() {
  if (fenceInterval) clearInterval(fenceInterval);
  const status = document.getElementById('fence-status');

  function cycleFences() {
    if (!gameActive) return;

    // Show 2-3 random fences
    const count = randInt(2, 3);
    const indices = [];
    while (indices.length < count) {
      const idx = randInt(0, fences.length - 1);
      if (!indices.includes(idx)) indices.push(idx);
    }

    // Hide all first
    fences.forEach(f => { f.el.className = 'fence hidden'; f.visible = false; });

    // Show selected
    status.textContent = 'Fences up! Wait...';
    status.style.opacity = '1';
    indices.forEach(idx => {
      fences[idx].el.className = 'fence visible';
      fences[idx].visible = true;
    });

    // After a few seconds, hide them
    setTimeout(() => {
      if (!gameActive) return;
      fences.forEach(f => { f.el.className = 'fence hidden'; f.visible = false; });
      status.textContent = 'Fences down! Go go go!';
      setTimeout(() => { status.style.opacity = '0.5'; }, 1000);
    }, randInt(2500, 4000));
  }

  // First fence appears after 3 seconds
  setTimeout(() => {
    cycleFences();
    fenceInterval = setInterval(cycleFences, randInt(5000, 7000));
  }, 3000);
}

// ---- GAME LOGIC ----
function startGame() {
  found = 0;
  score = 0;
  seconds = 0;
  hintsLeft = 3;
  gameActive = true;

  document.getElementById('count').textContent = '0';
  document.getElementById('timer').textContent = '0:00';
  document.getElementById('hints-left').textContent = '3';

  buildScene();
  showScreen('game-screen');
  startFenceCycle();

  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    seconds++;
    document.getElementById('timer').textContent = formatTime(seconds);
  }, 1000);
}

function collectEgg(e, index) {
  if (!gameActive || eggs[index].found) return;
  e.stopPropagation();

  const egg = eggs[index].el;

  // Crack animation sequence
  eggs[index].found = true;
  egg.classList.add('cracking');

  setTimeout(() => {
    egg.classList.remove('cracking');
    egg.classList.add('cracked');
    found++;
    score += CLUES[index].points;
    document.getElementById('count').textContent = found;

    const basketSlot = document.getElementById('basket-' + index);
    if (basketSlot) setTimeout(() => basketSlot.classList.add('collected'), 200);

    createSparkles(e.clientX, e.clientY);
    setTimeout(() => showClue(index), 600);
  }, 350);
}

function createSparkles(x, y) {
  const emojis = ['✨', '⭐', '🌟', '💫', '🎉'];
  for (let i = 0; i < 6; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = emojis[i % emojis.length];
    s.style.left = (x + rand(-35, 35)) + 'px';
    s.style.top = (y + rand(-35, 35)) + 'px';
    s.style.animationDelay = (i * 0.08) + 's';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1000);
  }
}

function showClue(index) {
  const cfg = EGG_CONFIGS[index];
  document.getElementById('clue-egg-icon').textContent = cfg.prize;
  document.getElementById('clue-text').textContent = CLUES[index].text;
  document.getElementById('clue-points').textContent = '+' + CLUES[index].points + ' points!';
  document.getElementById('overlay').style.display = 'block';
  document.getElementById('clue-popup').style.display = 'block';
}

function closeClue() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('clue-popup').style.display = 'none';
  if (found >= 12) setTimeout(showWin, 300);
}

function useHint() {
  if (hintsLeft <= 0 || !gameActive) return;
  const unfound = eggs.filter(e => !e.found);
  if (unfound.length === 0) return;
  hintsLeft--;
  document.getElementById('hints-left').textContent = hintsLeft;
  const target = unfound[Math.floor(Math.random() * unfound.length)];
  target.el.classList.add('hint-glow');
  setTimeout(() => target.el.classList.remove('hint-glow'), 3500);
}

function showWin() {
  gameActive = false;
  clearInterval(timerInterval);
  clearInterval(fenceInterval);
  const t = formatTime(seconds);
  let rating = '';
  if (seconds < 30) rating = 'Incredible! Lightning fast!';
  else if (seconds < 60) rating = 'Amazing hunter!';
  else if (seconds < 120) rating = 'Great job!';
  else rating = 'You did it! Persistence wins!';
  document.getElementById('win-stats').innerHTML = 'Time: <strong>' + t + '</strong><br>' + rating;
  document.getElementById('win-score').innerHTML = 'Total Score: <strong>' + score + ' points</strong>';
  showScreen('win-screen');
  launchConfetti();
}

function launchConfetti() {
  const items = ['🎉','🥳','🎊','🐣','🌈','🐰','✨','🎀','💐','👑'];
  for (let i = 0; i < 35; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.style.cssText = 'position:fixed;font-size:' + rand(1.5,3) + 'rem;left:' + rand(5,95) + '%;top:-5%;z-index:1000;pointer-events:none;animation:confettiFall ' + rand(2,4) + 's ease forwards;';
      c.textContent = items[i % items.length];
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 5000);
    }, i * 90);
  }
  if (!document.getElementById('confetti-style')) {
    const s = document.createElement('style');
    s.id = 'confetti-style';
    s.textContent = '@keyframes confettiFall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}';
    document.head.appendChild(s);
  }
}

function restartGame() { startGame(); }
</script>
